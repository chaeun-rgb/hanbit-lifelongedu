<style>
/* ===================================================================
   한빛 Design System — Colors & Type
   Source: hanbitn/hanbit-design (Figma: usRZn9VKhXQ9MedDWw1u57)
   262 tokens · Light mode · Mobile-first
   =================================================================== */

/* ---------- Webfont ---------- */
/* Pretendard — the de-facto Korean modern UI sans.
   Used here as the substitute for the Figma "Typography" page
   (no specific font name was extracted from the source). */
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css");
/* Code / mono */
@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap");

:root {
  /* =================================================================
     ATOMIC — Common
     ================================================================= */
  --color-common-0:   #ffffff;
  --color-common-100: #000000;

  /* =================================================================
     ATOMIC — Neutral (warm)
     ================================================================= */
  --color-neutral-5:  #fafafa;
  --color-neutral-10: #f5f5f5;
  --color-neutral-15: #ededed;
  --color-neutral-20: #e5e5e5;
  --color-neutral-25: #dcdcdc;
  --color-neutral-30: #d4d4d4;
  --color-neutral-35: #c5c5c5;
  --color-neutral-40: #b0afaf;
  --color-neutral-45: #929292;
  --color-neutral-50: #737373;
  --color-neutral-55: #666666;
  --color-neutral-60: #525252;
  --color-neutral-65: #494949;
  --color-neutral-70: #404040;
  --color-neutral-75: #383737;
  --color-neutral-80: #262626;
  --color-neutral-90: #171717;
  --color-neutral-95: #0a0a0a;

  /* =================================================================
     ATOMIC — Cool Neutral (blue-cool, default set)
     ================================================================= */
  --color-cool-5:  #f9fafb;
  --color-cool-10: #f3f4f6;
  --color-cool-15: #ebedf0;
  --color-cool-20: #e5e7eb;
  --color-cool-25: #dcdfe4;
  --color-cool-30: #d1d5dc;
  --color-cool-35: #b7beca;
  --color-cool-40: #99a1af;
  --color-cool-45: #7a8393;
  --color-cool-50: #6a7282;
  --color-cool-55: #5c6676;
  --color-cool-60: #4a5565;
  --color-cool-65: #3e4a5c;
  --color-cool-70: #364153;
  --color-cool-75: #2f3849;
  --color-cool-80: #1e2939;
  --color-cool-90: #101828;
  --color-cool-95: #030712;

  /* =================================================================
     ATOMIC — Emerald (brand)
     ================================================================= */
  --color-emerald-5:  #ecfdf5;
  --color-emerald-10: #cdefec;
  --color-emerald-15: #b8e4e1;
  --color-emerald-20: #9adfd9;
  --color-emerald-25: #89dad3;
  --color-emerald-30: #68cec6;
  --color-emerald-35: #4fc9bf;
  --color-emerald-40: #35beb3;
  --color-emerald-45: #20b3a7;
  --color-emerald-50: #03aea0;
  --color-emerald-55: #009e91;
  --color-emerald-60: #028b80;
  --color-emerald-65: #007c72;
  --color-emerald-70: #026860;
  --color-emerald-75: #006159;
  --color-emerald-80: #005a53;
  --color-emerald-90: #004640;
  --color-emerald-95: #012320;

  /* =================================================================
     ATOMIC — Status palettes
     ================================================================= */
  /* Red */
  --color-red-5:  #fef2f2;  --color-red-10: #ffe2e2; --color-red-20: #ffc9c9;
  --color-red-30: #ffa2a2;  --color-red-40: #ff6467; --color-red-50: #fb2c36;
  --color-red-60: #e7000b;  --color-red-70: #c10007; --color-red-80: #9f0712;
  --color-red-90: #82181a;  --color-red-95: #460809;
  /* Orange */
  --color-orange-5:  #fff7ed; --color-orange-10: #ffedd4; --color-orange-20: #ffd6a8;
  --color-orange-30: #ffb86a; --color-orange-40: #ff8904; --color-orange-50: #ff6900;
  --color-orange-60: #f54900; --color-orange-70: #ca3500; --color-orange-80: #9f2d00;
  --color-orange-90: #7e2a0c; --color-orange-95: #441306;
  /* Yellow */
  --color-yellow-5:  #fefce8; --color-yellow-10: #fef9c2; --color-yellow-20: #fff085;
  --color-yellow-30: #ffdf20; --color-yellow-40: #fdc700; --color-yellow-50: #f0b100;
  --color-yellow-60: #d08700; --color-yellow-70: #a65f00; --color-yellow-80: #894b00;
  --color-yellow-90: #733e0a; --color-yellow-95: #432004;
  /* Lime */
  --color-lime-5: #f7fee7; --color-lime-10: #ecfcca; --color-lime-20: #d8f999;
  --color-lime-30: #bbf451; --color-lime-40: #9ae600; --color-lime-50: #7ccf00;
  --color-lime-60: #5ea500; --color-lime-70: #497d00; --color-lime-80: #3c6300;
  --color-lime-90: #35530e; --color-lime-95: #192e03;
  /* Green */
  --color-green-5:  #f0fdf4; --color-green-10: #dcfce7; --color-green-20: #b9f8cf;
  --color-green-30: #7bf1a8; --color-green-40: #05df72; --color-green-50: #00c950;
  --color-green-60: #00a63e; --color-green-70: #008236; --color-green-80: #016630;
  --color-green-90: #0d542b; --color-green-95: #032e15;
  /* Cyan */
  --color-cyan-5:  #ecfeff; --color-cyan-10: #cefafe; --color-cyan-20: #a2f4fd;
  --color-cyan-30: #53eafd; --color-cyan-40: #00d3f3; --color-cyan-50: #00b8db;
  --color-cyan-60: #0092b8; --color-cyan-70: #007595; --color-cyan-80: #005f78;
  --color-cyan-90: #104e64; --color-cyan-95: #053345;
  /* Sky */
  --color-sky-5:  #f0f9ff; --color-sky-10: #dff2fe; --color-sky-20: #b8e6fe;
  --color-sky-30: #74d4ff; --color-sky-40: #00bcff; --color-sky-50: #00a6f4;
  --color-sky-60: #0084d1; --color-sky-70: #0069a8; --color-sky-80: #00598a;
  --color-sky-90: #024a70; --color-sky-95: #052f4a;
  /* Blue */
  --color-blue-5:  #eff6ff; --color-blue-10: #dbeafe; --color-blue-20: #bedbff;
  --color-blue-30: #8ec5ff; --color-blue-40: #51a2ff; --color-blue-50: #2b7fff;
  --color-blue-60: #155dfc; --color-blue-70: #1447e6; --color-blue-80: #193cb8;
  --color-blue-90: #1c398e; --color-blue-95: #162456;
  /* Purple */
  --color-purple-5:  #faf5ff; --color-purple-10: #f3e8ff; --color-purple-20: #e9d4ff;
  --color-purple-30: #dab2ff; --color-purple-40: #c27aff; --color-purple-50: #ad46ff;
  --color-purple-60: #9810fa; --color-purple-70: #8200db; --color-purple-80: #6e11b0;
  --color-purple-90: #59168b; --color-purple-95: #3c0366;
  /* Pink */
  --color-pink-5:  #fdf2f8; --color-pink-10: #fce7f3; --color-pink-20: #fccee8;
  --color-pink-30: #fda5d5; --color-pink-40: #fb64b6; --color-pink-50: #f6339a;
  --color-pink-60: #e60076; --color-pink-70: #c6005c; --color-pink-80: #a3004c;
  --color-pink-90: #861043; --color-pink-95: #510424;

  /* =================================================================
     SEMANTIC — Primary (brand · Emerald)
     ================================================================= */
  --color-primary-normal: var(--color-emerald-50);
  --color-primary-strong: var(--color-emerald-55);
  --color-primary-heavy:  var(--color-emerald-60);

  /* =================================================================
     SEMANTIC — Label (text)
     ================================================================= */
  --color-label-strong:      var(--color-common-100);
  --color-label-normal:      var(--color-cool-95);
  --color-label-neutral:     rgba(30, 41, 57, 0.88);
  --color-label-alternative: rgba(62, 74, 92, 0.61);
  --color-label-assistive:   rgba(62, 74, 92, 0.28);
  --color-label-disable:     rgba(62, 74, 92, 0.16);

  /* =================================================================
     SEMANTIC — Background
     ================================================================= */
  --color-bg-normal:        var(--color-common-0);     /* page bg */
  --color-bg-alternative:   var(--color-cool-10);      /* section bg */
  --color-bg-elev-normal:   var(--color-common-0);     /* floating */
  --color-bg-elev-alt:      var(--color-cool-30);

  /* =================================================================
     SEMANTIC — Line · Fill · Material
     ================================================================= */
  --color-line-normal:      rgba(92, 102, 118, 0.22);
  --color-line-neutral:     rgba(92, 102, 118, 0.16);
  --color-line-alternative: rgba(92, 102, 118, 0.08);
  --color-fill-normal:      rgba(92, 102, 118, 0.08);
  --color-fill-strong:      rgba(92, 102, 118, 0.16);
  --color-fill-alternative: rgba(92, 102, 118, 0.05);
  --color-dimmer:           rgba(3, 7, 18, 0.52);

  /* =================================================================
     SEMANTIC — Status
     ================================================================= */
  --color-status-positive:   var(--color-green-50);   /* #00c950 */
  --color-status-cautionary: var(--color-orange-50);  /* #ff6900 */
  --color-status-negative:   var(--color-red-50);     /* #fb2c36 */

  /* =================================================================
     SEMANTIC — Interaction
     ================================================================= */
  --color-interaction-inactive: var(--color-cool-35);
  --color-interaction-disable:  var(--color-cool-5);

  /* =================================================================
     SEMANTIC — Inverse
     ================================================================= */
  --color-inverse-bg:      var(--color-cool-95);
  --color-inverse-label:   var(--color-cool-10);
  --color-inverse-primary: var(--color-emerald-50);

  /* =================================================================
     SEMANTIC — Accent (foreground / background pairs)
     ================================================================= */
  --color-accent-bg-orange: var(--color-orange-40);  --color-accent-fg-orange: var(--color-orange-60);
  --color-accent-bg-lime:   var(--color-lime-40);    --color-accent-fg-lime:   var(--color-lime-60);
  --color-accent-bg-cyan:   var(--color-cyan-40);    --color-accent-fg-cyan:   var(--color-cyan-60);
  --color-accent-bg-sky:    var(--color-sky-40);     --color-accent-fg-sky:    var(--color-sky-60);
  --color-accent-bg-blue:   var(--color-blue-40);    --color-accent-fg-blue:   var(--color-blue-60);
  --color-accent-bg-purple: var(--color-purple-40);  --color-accent-fg-purple: var(--color-purple-60);
  --color-accent-bg-pink:   var(--color-pink-40);    --color-accent-fg-pink:   var(--color-pink-60);

  /* =================================================================
     TYPE — Families
     Pretendard for KR-first UI · JetBrains Mono for code
     ================================================================= */
  --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
               "Apple SD Gothic Neo", "Noto Sans KR", system-ui, "Segoe UI",
               Roboto, "Helvetica Neue", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, "SF Mono",
               Menlo, Consolas, "Liberation Mono", monospace;

  /* =================================================================
     TYPE — Scale (size · line-height · weight · letter-spacing)
     Inferred from common Hanbit UI patterns; flag for review.
     ================================================================= */
  --font-display-1: 700 56px/1.14 var(--font-sans);
  --font-display-2: 700 44px/1.18 var(--font-sans);
  --font-h1:        700 32px/1.25 var(--font-sans);
  --font-h2:        700 26px/1.30 var(--font-sans);
  --font-h3:        700 22px/1.36 var(--font-sans);
  --font-h4:        600 18px/1.44 var(--font-sans);
  --font-title:     600 16px/1.50 var(--font-sans);
  --font-body:      400 16px/1.60 var(--font-sans);
  --font-body-sm:   400 14px/1.57 var(--font-sans);
  --font-label:     500 14px/1.43 var(--font-sans);
  --font-caption:   400 13px/1.46 var(--font-sans);
  --font-mini:      400 11px/1.45 var(--font-sans);
  --font-code:      400 14px/1.55 var(--font-mono);

  /* Letter-spacing — slight negative tracking on Korean display */
  --tracking-display: -0.02em;
  --tracking-heading: -0.01em;
  --tracking-body:    0;

  /* =================================================================
     SPACING / RADIUS / SHADOW
     ================================================================= */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;

  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;   /* Modal Small / Medium */
  --radius-lg: 16px;
  --radius-xl: 20px;   /* Modal Large / XLarge */
  --radius-2xl: 28px;
  --radius-full: 999px;

  --shadow-card:    0 1px 2px rgba(3, 7, 18, 0.04), 0 1px 3px rgba(3, 7, 18, 0.06);
  --shadow-elev-1:  0 4px 12px rgba(3, 7, 18, 0.06), 0 1px 2px rgba(3, 7, 18, 0.04);
  --shadow-elev-2:  0 8px 24px rgba(3, 7, 18, 0.08), 0 2px 6px rgba(3, 7, 18, 0.05);
  --shadow-modal:   0 24px 64px rgba(3, 7, 18, 0.18), 0 4px 16px rgba(3, 7, 18, 0.06);
  --shadow-focus:   0 0 0 3px rgba(3, 174, 160, 0.28);

  /* =================================================================
     BREAKPOINTS — for reference (used via @media)
     xs <768 · sm ≥768 · md ≥992 · lg ≥1200 · xl ≥1600
     ================================================================= */
  --bp-sm: 768px;
  --bp-md: 992px;
  --bp-lg: 1200px;
  --bp-xl: 1600px;

  /* =================================================================
     VIEWPORT WIDTH TOKENS
     ================================================================= */
  --viewport-lg: 1100px;
  --viewport-xl: 1440px;
  --margin-platform: 20px;
}

/* ===================================================================
   ELEMENT BASE STYLES
   Map semantic vars to native elements so plain HTML inherits the system.
   =================================================================== */
html, body {
  background: var(--color-bg-normal);
  color: var(--color-label-normal);
  font: var(--font-body);
  letter-spacing: var(--tracking-body);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1 { font: var(--font-h1); letter-spacing: var(--tracking-heading); color: var(--color-label-strong); margin: 0; }
h2 { font: var(--font-h2); letter-spacing: var(--tracking-heading); color: var(--color-label-strong); margin: 0; }
h3 { font: var(--font-h3); letter-spacing: var(--tracking-heading); color: var(--color-label-strong); margin: 0; }
h4 { font: var(--font-h4); color: var(--color-label-strong); margin: 0; }
h5, h6 { font: var(--font-title); color: var(--color-label-strong); margin: 0; }

p { font: var(--font-body); color: var(--color-label-normal); margin: 0; text-wrap: pretty; }
small { font: var(--font-caption); color: var(--color-label-alternative); }

a { color: var(--color-primary-heavy); text-decoration: none; }
a:hover { color: var(--color-primary-strong); text-decoration: underline; }

code, kbd, samp { font: var(--font-code); }
code {
  background: var(--color-fill-normal);
  color: var(--color-label-strong);
  padding: 2px 6px;
  border-radius: var(--radius-xs);
}
pre {
  font: var(--font-code);
  background: var(--color-bg-alternative);
  color: var(--color-label-strong);
  padding: 16px 20px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-line-alternative);
  overflow-x: auto;
}

hr { border: 0; border-top: 1px solid var(--color-line-normal); margin: 24px 0; }

::selection { background: var(--color-emerald-15); color: var(--color-emerald-90); }

/* Focus ring — keyboard only */
*:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
  border-radius: var(--radius-xs);
}

/* ====================================================================
   평생교육이용권 전용관 — layout & responsive
   한빛 Design System tokens only.
   ==================================================================== */

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--color-bg-normal); overflow-x: hidden; }
img { display: block; max-width: 100%; }
button { font-family: var(--font-sans); }

.wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px; width: 100%; }
.wrap-wide { max-width: 1200px; margin: 0 auto; padding: 0 20px; width: 100%; }

/* ---- section rhythm ---- */
.section { padding: 72px 0; }
.section--tight { padding: 56px 0; }
.section--alt { background: var(--color-bg-alternative); }

.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font: 700 12px/1 var(--font-sans); letter-spacing: .02em;
  color: var(--color-label-neutral);
  background: var(--color-cool-5); border: 1px solid var(--color-line-normal);
  padding: 7px 12px; border-radius: 999px;
}
.eyebrow--mono { font-family: var(--font-mono); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; font-size: 11.5px; }
.eyebrow--emerald { background: #ecfdf5; border-color: #b8e4e1; color: #028b80; }
.eyebrow--blue    { background: #eff6ff; border-color: #bedbff; color: #155dfc; }
.eyebrow--purple  { background: #faf5ff; border-color: #e9d4ff; color: #9810fa; }
.eyebrow--cyan    { background: #ecfeff; border-color: #a2f4fd; color: #0092b8; }
.eyebrow--lime    { background: #f7fee7; border-color: #d8f999; color: #5ea500; }

.section-head { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; margin-bottom: 36px; }
.section-head h2 { font: var(--font-h1); letter-spacing: var(--tracking-heading); }
.section-head p { color: var(--color-label-alternative); font-size: 16px; max-width: 640px; }

/* ====================================================================
   HEADER
   ==================================================================== */
.hd {
  position: sticky; top: 0; z-index: 40;
  background: rgba(255,255,255,.86);
  backdrop-filter: saturate(160%) blur(10px);
  border-bottom: 1px solid var(--color-line-normal);
}
.hd-inner { display: flex; align-items: center; gap: 24px; height: 60px; }
.hd-logo { display: flex; align-items: baseline; gap: 8px; font: 800 22px/1 var(--font-sans); letter-spacing: -.02em; color: var(--color-label-strong); white-space: nowrap; }
.hd-logo b { color: var(--color-primary-normal); }
.hd-logo .tag {
  font: 600 11px/1 var(--font-sans); letter-spacing: 0; white-space: nowrap;
  color: var(--color-primary-heavy); background: var(--color-emerald-5);
  border: 1px solid var(--color-emerald-15);
  padding: 4px 8px; border-radius: 999px; align-self: center;
}
.hd-nav { display: flex; gap: 2px; margin-left: 6px; }
.hd-nav a { padding: 8px 13px; border-radius: 8px; color: var(--color-label-neutral); font: 500 14px/1 var(--font-sans); white-space: nowrap; }
.hd-nav a:hover { background: var(--color-fill-normal); text-decoration: none; color: var(--color-label-strong); }
.hd-spacer { flex: 1; }
.hd-actions { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.hd-link { color: var(--color-label-neutral); font: 500 14px/1 var(--font-sans); cursor: pointer; white-space: nowrap; }
.hd-link:hover { color: var(--color-label-strong); }
@media (max-width: 1000px) { .hd-logo .tag { display: none; } }
@media (max-width: 860px) { .hd-nav { display: none; } .hd-link.hide-sm { display: none; } }

/* ====================================================================
   BUTTONS
   ==================================================================== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font: 600 15px/1 var(--font-sans); border: 0; border-radius: 12px;
  padding: 15px 24px; cursor: pointer; white-space: nowrap;
  transition: background .18s cubic-bezier(.2,.8,.2,1), transform .12s, box-shadow .18s, color .18s;
}
.btn:active { transform: scale(.98); }
.btn-sm { padding: 9px 14px; font-size: 13px; border-radius: 9px; white-space: nowrap; }
.btn-primary { background: var(--color-primary-normal); color: #fff; }
.btn-primary:hover { background: var(--color-primary-strong); color:#fff; }
.btn-onlight-outline { background: #fff; color: var(--color-label-normal); border: 1px solid var(--color-line-normal); }
.btn-onlight-outline:hover { background: var(--color-fill-normal); }
.btn-ondark { background: #fff; color: var(--color-emerald-90); }
.btn-ondark:hover { background: var(--color-emerald-5); }
.btn-ondark-ghost { background: rgba(255,255,255,.10); color: #fff; border: 1px solid rgba(255,255,255,.30); }
.btn-ondark-ghost:hover { background: rgba(255,255,255,.18); }
.btn-block { width: 100%; }

/* ====================================================================
   HERO — shared
   ==================================================================== */
.hero { position: relative; overflow: hidden; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
  padding: 7px 14px 7px 11px; border-radius: 999px;
  font: 600 13px/1 var(--font-sans);
}
.hero h1 { letter-spacing: var(--tracking-display); text-wrap: balance; }
.hero .lead { text-wrap: pretty; }

.heroA .hero-cta { margin-top: 30px; }
.heroA .hero-trust { margin-top: 28px; }

/* voucher card visual */
.voucher-stage { position: relative; display: flex; justify-content: center; align-items: center; min-height: 400px; }
.voucher-wrap { position: relative; width: 100%; max-width: 380px; }
.voucher {
  position: relative; width: 100%; aspect-ratio: 1.585 / 1;
  border-radius: 20px; padding: 24px 26px; color: #fff;
  background: linear-gradient(125deg, #03aea0 0%, #0a8f9e 38%, #1b2a8a 100%);
  box-shadow: 0 34px 64px -24px rgba(11,42,90,.55), 0 10px 24px rgba(3,35,40,.25);
  display: flex; flex-direction: column; justify-content: space-between;
  transform: rotate(-3deg);
  overflow: hidden;
}
.voucher::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(80% 120% at 90% -10%, rgba(255,255,255,.22), transparent 50%),
    radial-gradient(60% 80% at -10% 110%, rgba(255,255,255,.10), transparent 55%);
}
.voucher::after {
  content: ""; position: absolute; right: -40px; bottom: -60px; width: 200px; height: 200px;
  border-radius: 50%; border: 38px solid rgba(255,255,255,.07); pointer-events: none;
}
.voucher > * { position: relative; z-index: 1; }
.voucher .v-top { display: flex; justify-content: space-between; align-items: flex-start; }
.voucher .v-issuer { font: 600 12px/1.4 var(--font-sans); color: rgba(255,255,255,.9); white-space: nowrap; flex-shrink: 0; }
.voucher .v-issuer b { display: block; font-weight: 700; font-size: 14px; margin-top: 2px; white-space: nowrap; }
.voucher .v-tag { font: 700 11px/1 var(--font-mono); letter-spacing: .08em; color: #fff; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.28); padding: 5px 9px; border-radius: 999px; }
.voucher .v-chip { width: 46px; height: 34px; border-radius: 7px; background: linear-gradient(135deg,#ffe9a8,#e8b04b); box-shadow: inset 0 1px 2px rgba(255,255,255,.5); position: relative; }
.voucher .v-chip::after { content: ""; position: absolute; inset: 6px 8px; border: 1px solid rgba(140,90,10,.45); border-radius: 3px; }
.voucher .v-mid { display: flex; align-items: center; gap: 16px; }
.voucher .v-num { font: 600 16px/1 var(--font-mono); letter-spacing: .14em; color: rgba(255,255,255,.92); text-shadow: 0 1px 1px rgba(0,0,0,.15); }
.voucher .v-bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
.voucher .v-bi img { height: 30px; width: auto; display: block; }
.voucher .v-valid { text-align: right; }
.voucher .v-valid .vk { font: 500 8px/1.3 var(--font-mono); letter-spacing: .1em; color: rgba(255,255,255,.7); }
.voucher .v-valid .vv { font: 700 13px/1 var(--font-sans); color: #fff; margin-top: 2px; }
.voucher-amount {
  position: absolute; right: 4px; bottom: -22px; z-index: 3;
  background: #fff; border-radius: 14px; padding: 11px 16px;
  box-shadow: var(--shadow-elev-2); border: 1px solid var(--color-line-alternative);
  transform: rotate(2deg);
}
.voucher-amount .va-cap { font: 600 12px/1 var(--font-sans); color: var(--color-label-alternative); }
.voucher-amount .va-num { font: 800 30px/1 var(--font-sans); color: var(--color-label-strong); letter-spacing: -.02em; margin-top: 5px; white-space: nowrap; }
.voucher-amount .va-num b { color: var(--color-primary-normal); font-weight: 800; }
.voucher-amount .va-num span { font-size: 18px; }
.voucher-float {
  position: absolute; left: 30px; top: -16px; z-index: 3;
  background: #fff; border-radius: 999px; padding: 8px 14px; display: flex; align-items: center; gap: 7px;
  box-shadow: var(--shadow-elev-1); border: 1px solid var(--color-line-alternative);
  font: 600 12.5px/1 var(--font-sans); color: var(--color-label-normal); white-space: nowrap;

/* ---- HERO B (dark / impact) ---- */
.heroB { background: var(--color-cool-95); color: #fff; }

.heroB-amount .num em {

.heroB h1 { font: 700 30px/1.4 var(--font-sans); color: #fff; margin: 22px 0 0; max-width: 720px; }
.heroB h1 .hl { color: var(--color-emerald-40); }
.heroB .lead { margin: 16px auto 0; font-size: 17px; line-height: 1.66; color: rgba(255,255,255,.72); max-width: 560px; }
.heroB .hero-cta { margin-top: 32px; justify-content: center; }
.heroB .hero-trust { margin-top: 34px; justify-content: center; }
.heroB .ti { color: rgba(255,255,255,.8); }
.heroB .ti .ic { color: var(--color-emerald-40); }

/* hero marquee of mini course chips (B) */
.hero-rail { margin-top: 52px; width: 100%; overflow: hidden; -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
.hero-rail-track { display: flex; gap: 14px; width: max-content; animation: railscroll 38s linear infinite; }

.hero-chip {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;

}

@keyframes railscroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ====================================================================
   SUPPORT / BENEFIT BAND
   ==================================================================== */
.support {
  background: #fff;
  color: var(--color-label-normal); border-radius: 24px; padding: 44px;
  display: grid; grid-template-columns: minmax(0,1fr) 1.2fr; gap: 44px; align-items: center;
  position: relative; overflow: hidden;
  border: 1px solid var(--color-line-normal); box-shadow: var(--shadow-elev-1);
}
.support-num { position: relative; z-index: 1; }
.support-num .cap { font: 600 15px/1.4 var(--font-sans); color: var(--color-label-alternative); }
.support-num .big { font: 800 66px/1 var(--font-sans); letter-spacing: -.03em; margin-top: 10px; color: var(--color-label-strong); }
.support-num .big span { color: var(--color-primary-normal); }
.support-num .note { font: 500 14px/1.6 var(--font-sans); color: var(--color-label-alternative); margin-top: 16px; max-width: 280px; }
.support-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; position: relative; z-index: 1; }
.support-fact { background: var(--color-cool-5); border: 1px solid var(--color-line-normal); border-radius: 14px; padding: 18px; }
.support-fact .sf-ic { width: 38px; height: 38px; border-radius: 10px; background: #fff; border: 1px solid var(--color-line-normal); display: flex; align-items: center; justify-content: center; color: var(--color-primary-normal); margin-bottom: 12px; }
.support-fact .sf-ic svg { color: inherit; }
.support-fact h4 { color: var(--color-label-strong); font: 700 16px/1.4 var(--font-sans); }
.support-fact p { color: var(--color-label-alternative); font: 400 13px/1.55 var(--font-sans); margin-top: 5px; }

/* ====================================================================
   STEPS
   ==================================================================== */
.steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.step { background: #fff; border: 1px solid var(--color-line-normal); border-radius: 16px; padding: 26px 22px; position: relative; transition: box-shadow .18s, transform .18s; }
.step:hover { box-shadow: var(--shadow-elev-1); transform: translateY(-2px); }
.step .s-num { font: 700 12px/1 var(--font-mono); letter-spacing: .1em; color: var(--color-label-alternative); background: var(--color-cool-5); border:1px solid var(--color-line-normal); padding: 6px 10px; border-radius: 999px; display: inline-block; }
.step .s-ic { width: 56px; height: 56px; border-radius: 16px; background: var(--color-cool-5); border: 1px solid var(--color-line-normal); display: flex; align-items: center; justify-content: center; color: var(--color-primary-normal); margin: 18px 0 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 10px 28px -24px currentColor; }
.step .s-ic svg { color: inherit; }
.step h4 { font: 700 18px/1.4 var(--font-sans); color: var(--color-label-strong); }
.step p { font: 400 14px/1.55 var(--font-sans); color: var(--color-label-alternative); margin-top: 6px; }
.step .s-arrow { position: absolute; right: -15px; top: 50%; transform: translateY(-50%); z-index: 2; color: #fff; background: var(--color-primary-normal); width: 30px; height: 30px; border-radius: 999px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 22px -14px rgba(3,174,160,.9); }
.step:last-child .s-arrow { display: none; }

/* ====================================================================
   COURSE CURATION
   ==================================================================== */
.curation-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab {
  border: 1px solid var(--color-line-normal); background: #fff; color: var(--color-label-neutral);
  border-radius: 999px; padding: 9px 16px; font: 600 14px/1 var(--font-sans); cursor: pointer;
  transition: all .15s cubic-bezier(.2,.8,.2,1); display: inline-flex; align-items: center; gap: 7px;
}
.tab:hover { transform: translateY(-1px); box-shadow: var(--shadow-elev-1); filter: brightness(.97); }
.tab.active { color: #fff; }
.tab .cnt { font-size: 12px; opacity: .55; }
.tab.active .cnt { opacity: .7; }

.sortsel { display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--color-line-normal); background: #fff; border-radius: 10px; padding: 9px 13px; font: 500 13px/1 var(--font-sans); color: var(--color-label-neutral); cursor: pointer; }

.course-quiz {
  margin: 30px 0 28px;
  border: 1px solid var(--color-line-normal);
  border-radius: 18px;
  background:
    linear-gradient(135deg, rgba(3,174,160,.10), rgba(21,93,252,.08) 52%, rgba(255,255,255,.96)),
    #fff;
  box-shadow: 0 28px 70px -56px rgba(3,7,18,.55);

}
.quiz-inner {

}
.quiz-copy {

}
.quiz-kicker {
  display: inline-flex;
  align-items: center;
  align-self: flex-start;
  gap: 8px;
  padding: 8px 12px;

  color: var(--color-primary-heavy);
  font: 800 12px/1 var(--font-sans);
}
.quiz-copy h3 {

  font: 800 28px/1.22 var(--font-sans);

}
.quiz-copy p {
  margin-top: 10px;
  color: var(--color-label-neutral);
  font: 400 15px/1.65 var(--font-sans);
}
.quiz-result {

}
.quiz-result-label {

}

  border-radius: 14px;

}
.quiz-q-head {

}

}
.quiz-q-head span {
  flex-shrink: 0;
  color: var(--color-primary-heavy);
  font: 800 11px/1 var(--font-mono);
}
.quiz-options {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}
.quiz-option {
  min-height: 44px;
  border: 1px solid var(--color-line-normal);
  border-radius: 11px;
  background: #fff;
  color: var(--color-label-neutral);
  padding: 10px 12px;
  text-align: center;
  font: 700 13px/1.3 var(--font-sans);

.quiz-recs {

.quiz-recs .ccard {

}

.quiz-recs .ccard-thumb {

  padding: 20px;
  box-shadow: 0 18px 34px -30px rgba(3,7,18,.65);

}

.course-stage { position: relative; }
.course-stage::before {
  content: "";
  position: absolute;
  inset: -12px;
  z-index: 3;
  border-radius: 18px;
  background: rgba(255,255,255,.68);
  -webkit-backdrop-filter: blur(1.5px);
  backdrop-filter: blur(1.5px);
  pointer-events: none;
}
.course-stage .course-grid {
  opacity: .42;
  filter: saturate(.72);
}
.course-notice {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 4;
  transform: translate(-50%, -50%);
  min-width: min(360px, calc(100% - 32px));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 18px 28px;
  border-radius: 999px;
  border: 1px solid var(--color-emerald-20);
  background: rgba(255,255,255,.94);
  color: var(--color-primary-heavy);
  font: 800 18px/1.2 var(--font-sans);
  box-shadow: 0 18px 50px -28px rgba(3,7,18,.48);
  text-align: center;
  pointer-events: none;
}
.course-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }

.ccard { background: #fff; border: 1px solid var(--color-line-alternative); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; transition: box-shadow .18s cubic-bezier(.2,.8,.2,1), transform .18s, border-color .18s; position: relative; }
.ccard::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; opacity: 0; transition: opacity .18s; z-index: 2; background: var(--cc-accent, transparent); }
.ccard:hover::before { opacity: 1; }
.ccard:hover { box-shadow: var(--shadow-elev-2); transform: translateY(-3px); border-color: var(--color-line-normal); }
.ccard-thumb { position: relative; aspect-ratio: 400/248; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; }
.ccard-thumb .ct-title { font: 700 17px/1.34 var(--font-sans); letter-spacing: -.01em; text-wrap: balance; }
.ccard-thumb .ct-pub { position: absolute; left: 12px; bottom: 12px; font: 700 10px/1 var(--font-mono); letter-spacing: .08em; padding: 5px 8px; border-radius: 6px; background: rgba(255,255,255,.9); }
.ccard-badges { position: absolute; top: 12px; left: 12px; display: flex; gap: 5px; }
.cbadge { font: 700 10px/1 var(--font-sans); letter-spacing: .03em; padding: 5px 7px; border-radius: 6px; color: #fff; }
.cbadge.best { background: var(--color-cool-80); }
.cbadge.update { background: var(--color-cool-80); }
.cbadge.sale { background: var(--color-status-negative); }
.cbadge.new { background: var(--color-status-cautionary); }
.ccard-body { padding: 16px 16px 18px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
.ccard-cat { display: inline-flex; align-items: center; gap: 5px; align-self: flex-start; font: 700 11px/1 var(--font-sans); padding: 5px 9px; border-radius: 999px; }
.ccard-title { font: 600 15.5px/1.42 var(--font-sans); color: var(--color-label-strong); text-wrap: balance; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ccard-author { font: 400 13px/1 var(--font-sans); color: var(--color-label-alternative); }
.ccard-meta { display: flex; align-items: center; gap: 12px; font: 500 12px/1 var(--font-sans); color: var(--color-label-neutral); margin-top: 2px; }
.ccard-meta .mi { display: inline-flex; align-items: center; gap: 4px; }

.ccard-price { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.ccard-price .disc { font: 800 15px/1 var(--font-sans); color: var(--color-status-negative); }
.ccard-price .now { font: 800 18px/1 var(--font-sans); color: var(--color-label-strong); }
.ccard-price .orig { font: 400 13px/1 var(--font-sans); color: var(--color-label-assistive); text-decoration: line-through; }
.ccard-voucher { display: inline-flex; align-items: center; gap: 5px; margin-top: 4px; font: 600 11.5px/1 var(--font-sans); color: var(--color-label-alternative); }

.curation-more { display: flex; justify-content: center; margin-top: 40px; }
.course-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 26px;
  margin-top: 42px;
}
.page-btn {
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--color-label-alternative);
  font: 700 21px/1 var(--font-sans);
  cursor: pointer;
}
.page-btn:hover { color: var(--color-label-normal); background: var(--color-fill-normal); }
.page-btn.active { color: var(--color-label-strong); background: #fff; box-shadow: 0 10px 24px -20px rgba(3,7,18,.42); }
.page-arrow {
  color: var(--color-label-assistive);
}
.page-arrow:not(:disabled) { color: var(--color-label-alternative); }
.page-arrow:disabled { cursor: default; opacity: .5; }

/* ====================================================================
   WHAT IS
   ==================================================================== */
.whatis-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.whatis-card { background: #fff; border: 1px solid var(--color-line-normal); border-radius: 16px; padding: 30px 26px; }
.whatis-card .wi-n { font: 800 14px/1 var(--font-mono); color: #fff; background: var(--color-cool-95); width: 32px; height: 32px; border-radius: 999px; display: flex; align-items: center; justify-content: center; }
.whatis-card h4 { font: 700 19px/1.4 var(--font-sans); color: var(--color-label-strong); margin: 18px 0 0; }
.whatis-card p { font: 400 14px/1.6 var(--font-sans); color: var(--color-label-alternative); margin-top: 8px; }
.whatis-card strong { color: var(--color-primary-heavy); }
.voucher-guide-link {
  min-width: 244px;
  justify-content: center;
  text-align: center;
}

/* ====================================================================
   FAQ
   ==================================================================== */
.faq-list { display: flex; flex-direction: column; gap: 12px; max-width: 820px; margin: 0 auto; }
.faq-item { border: 1px solid var(--color-line-normal); border-radius: 14px; background: #fff; overflow: hidden; transition: box-shadow .18s, border-color .18s; }
.faq-item.open { box-shadow: var(--shadow-card); border-color: var(--color-cool-25); }
.faq-q { width: 100%; text-align: left; background: none; border: 0; cursor: pointer; padding: 22px 24px; display: flex; align-items: center; gap: 14px; }
.faq-q .qmark { font: 800 16px/1 var(--font-sans); color: var(--color-primary-normal); flex-shrink: 0; }
.faq-q .qt { font: 600 17px/1.45 var(--font-sans); color: var(--color-label-strong); flex: 1; }
.faq-q .qchev { color: var(--color-label-alternative); transition: transform .22s cubic-bezier(.2,.8,.2,1); flex-shrink: 0; }
.faq-item.open .qchev { transform: rotate(180deg); color: var(--color-primary-normal); }
.faq-a { overflow: hidden; max-height: 0; transition: max-height .28s cubic-bezier(.2,.8,.2,1); }
.faq-item.open .faq-a { max-height: 460px; }
.faq-q > .ic { color: var(--color-label-alternative); transition: transform .22s cubic-bezier(.2,.8,.2,1); flex-shrink: 0; }
.faq-item.open .faq-q > .ic { transform: rotate(180deg); color: var(--color-primary-normal); }
.faq-a-inner { padding: 0 24px 24px 52px; font: 400 15px/1.7 var(--font-sans); color: var(--color-label-neutral); }

/* sort dropdown (static build) */
.sortmenu { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--color-line-normal); border-radius: 10px; box-shadow: var(--shadow-elev-1); padding: 6px; z-index: 5; min-width: 140px; }
.sortmenu[hidden] { display: none; }

/* ====================================================================
   FINAL CTA
   ==================================================================== */
.finalcta { background: var(--color-cool-95); color: #fff; border-radius: 24px; padding: 56px 48px; text-align: center; position: relative; overflow: hidden; }
.finalcta::before { content:""; position:absolute; inset:0; background: radial-gradient(70% 120% at 50% 0%, rgba(3,174,160,.32), transparent 60%); }
.finalcta > * { position: relative; z-index: 1; }
.finalcta h2 { font: 800 36px/1.25 var(--font-sans); color: #fff; letter-spacing: -.02em; }
.finalcta p { color: rgba(255,255,255,.74); font-size: 17px; margin: 16px auto 0; max-width: 520px; }
.finalcta .hero-cta { justify-content: center; margin-top: 30px; }

/* ====================================================================
   FOOTER
   ==================================================================== */
.ft { background: var(--color-inverse-bg); color: var(--color-inverse-label); padding: 56px 0 40px; }
.ft-top { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; padding-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,.1); }
.ft-logo { font: 800 22px/1 var(--font-sans); letter-spacing: -.02em; color: #fff; }
.ft-logo b { color: var(--color-emerald-40); }
.ft-links { display: flex; gap: 22px; flex-wrap: wrap; }
.ft-links a { color: rgba(255,255,255,.7); font: 500 14px/1 var(--font-sans); }
.ft-links a:hover { color: #fff; text-decoration: none; }
.ft-info { padding-top: 28px; display: flex; flex-direction: column; gap: 6px; }
.ft-info .row { display: flex; flex-wrap: wrap; gap: 6px 18px; }
.ft-info span { font: 400 13px/1.5 var(--font-sans); color: rgba(255,255,255,.5); }
.ft-copy { margin-top: 18px; font: 400 12px/1 var(--font-mono); color: rgba(255,255,255,.4); letter-spacing: .04em; }

/* ====================================================================
   MARKETING EMPHASIS (균형 mode) — promo bar, dark support, hero accents
   ==================================================================== */
.promo { background: var(--color-cool-95); color: #fff; }
.promo-inner { display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 42px; font: 600 13.5px/1.4 var(--font-sans); flex-wrap: wrap; }
.promo .pp { display: inline-flex; align-items: center; gap: 5px; background: var(--color-primary-normal); color: #fff; font: 700 11px/1 var(--font-sans); padding: 5px 9px; border-radius: 999px; letter-spacing: .04em; flex-shrink: 0; }
.promo .pt { color: rgba(255,255,255,.88); }
.promo .pt b { color: var(--color-emerald-40); font-weight: 700; }
.promo .pa { display: inline-flex; align-items: center; gap: 4px; color: #fff; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
.promo .pa:hover { color: var(--color-emerald-40); text-decoration: none; }
@media (max-width: 600px) { .promo-inner { padding: 9px 0; font-size: 12px; gap: 8px; text-align: center; } .promo .pa { display: none; } }

.heroA-badge.badge-brand { background: var(--color-emerald-5); color: var(--color-primary-heavy); border-color: var(--color-emerald-20); }
.heroA h1 .hl.mark {
  color: var(--color-label-strong);
  background: linear-gradient(transparent 56%, var(--color-emerald-20) 56%);
  padding: 0 5px; border-radius: 3px;
  -webkit-box-decoration-break: clone; box-decoration-break: clone;
}

.support--dark { background: linear-gradient(135deg, #101828 0%, #052c31 58%, #030712 100%); color: #fff; border: 1px solid rgba(255,255,255,.12); box-shadow: 0 24px 60px -24px rgba(3,7,18,.55); }
.support--dark::before { content: ""; position: absolute; right: -50px; top: -70px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(3,174,160,.38), transparent 70%); pointer-events: none; }
.support--dark .support-num .cap { color: rgba(255,255,255,.72); }
.support--dark .support-num .big { color: #fff; }
.support--dark .support-num .big span { color: var(--color-emerald-40); }
.support--dark .support-num .note { color: rgba(255,255,255,.66); }
.support--dark .support-fact { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); box-shadow: inset 0 1px 0 rgba(255,255,255,.08); }
.support--dark .support-fact .sf-ic { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.28); color: var(--color-emerald-40); }
.support--dark .support-fact h4 { color: #fff; }
.support--dark .support-fact p { color: rgba(255,255,255,.66); }

/* ====================================================================
   ENTRANCE ANIMATIONS
   ==================================================================== */
@media (prefers-reduced-motion: no-preference) {
  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .6s cubic-bezier(.2,.8,.2,1), transform .6s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  .reveal.d1 { transition-delay: .06s; }
  .reveal.d2 { transition-delay: .12s; }
  .reveal.d3 { transition-delay: .18s; }
  .reveal.d4 { transition-delay: .24s; }
}

/* ====================================================================
   RESPONSIVE
   ==================================================================== */
@media (max-width: 1024px) {
  .course-grid { grid-template-columns: repeat(3, 1fr); }
  .quiz-recs { grid-template-columns: repeat(2, 1fr); }
  .heroA h1 { font-size: 44px; }
  .heroB-amount .num { font-size: 78px; }
}
@media (max-width: 880px) {
  .section { padding: 56px 0; }
  .heroA-grid { grid-template-columns: 1fr; gap: 40px; padding: 56px 0 64px; }
  .voucher-stage { min-height: 300px; }
  .support { grid-template-columns: 1fr; gap: 28px; padding: 34px 28px; }
  .steps { grid-template-columns: repeat(2, 1fr); }
  .step .s-arrow { display: none !important; }
  .whatis-grid { grid-template-columns: 1fr; }
  .course-grid { grid-template-columns: repeat(2, 1fr); }
  .quiz-inner { grid-template-columns: 1fr; padding: 22px; }
  .quiz-recs { grid-template-columns: repeat(2, 1fr); padding: 0 22px 22px; }
}
@media (max-width: 560px) {
  .wrap, .wrap-wide { padding: 0 16px; }
  .section { padding: 44px 0; }
  .section-head h2 { font-size: 26px; }
  .heroA h1 { font-size: 34px; }
  .heroA .lead { font-size: 16px; }
  .heroB-amount .num { font-size: 60px; }
  .heroB-amount .cap { font-size: 15px; padding-bottom: 9px; }
  .heroB h1 { font-size: 23px; }
  .support-num .big { font-size: 52px; }
  .support-facts { grid-template-columns: 1fr; }
  .steps { grid-template-columns: 1fr; }
  .quiz-inner { padding: 18px; }
  .quiz-copy h3 { font-size: 24px; }
  .quiz-options { grid-template-columns: 1fr; }
  .quiz-recs { grid-template-columns: 1fr; padding: 0 18px 18px; }
  .course-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
  .ccard-title { font-size: 14px; }
  .ccard-thumb .ct-title { font-size: 15px; }
  .finalcta { padding: 40px 24px; }
  .finalcta h2 { font-size: 27px; }
  .btn { padding: 13px 18px; font-size: 14px; }
  .faq-a-inner { padding-left: 24px; }
}
@media (max-width: 380px) {
  .course-grid { grid-template-columns: 1fr; }
}

  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;

}

  function currentQuizProfile() {
    var scores = {};
    var allowed = COURSE_RECOMMEND_RULES.level[quizState.level] || COURSE_RECOMMEND_RULES.level.beginner;
    var goalPicks = ((GOAL_RECOMMEND_BY_LEVEL[quizState.level] || {})[quizState.goal] || []).filter(function (id) {
      return allowed.indexOf(id) >= 0;
    });
    function add(ids, weight) {
      ids.forEach(function (id, index) {
        if (allowed.indexOf(id) < 0) return;
        scores[id] = (scores[id] || 0) + weight + Math.max(0, 6 - index) * .1;
      });
    }
    add(goalPicks, 9);
    add(COURSE_RECOMMEND_RULES.goal[quizState.goal] || [], 5);
    add(COURSE_RECOMMEND_RULES.level[quizState.level] || [], 1);
    allowed.forEach(function (id, index) {
      if (!scores[id]) scores[id] = .5 + Math.max(0, 4 - index) * .05;
    });

    var sorted = Object.keys(scores).map(Number).sort(function (a, b) {
      return scores[b] - scores[a] || b - a;
    });
    var ids = [];
    goalPicks.concat(sorted).forEach(function (id) {
      if (ids.length < 4 && ids.indexOf(id) < 0) ids.push(id);
    });
    var info = LEVEL_INFO[quizState.level] || LEVEL_INFO.beginner;
    return { title: info.title, text: info.text, ids: ids };
  }

  function renderQuiz() {
    var panel = document.getElementById('quiz-panel');
    var result = document.getElementById('quiz-result');
    var recs = document.getElementById('quiz-recs');
    if (!panel || !result || !recs) return;

    panel.innerHTML = QUIZ_QUESTIONS.map(function (q) {
      return '<div class="quiz-question">' +
        '<div class="quiz-q-head"><strong>' + q.title + '</strong><span>' + q.step + '</span></div>' +
        '<div class="quiz-options">' + q.options.map(function (o) {
          var active = quizState[q.id] === o.value;
          return '<button class="quiz-option' + (active ? ' active' : '') + '" data-quiz="' + q.id + '" data-quiz-value="' + o.value + '">' + o.label + '</button>';
        }).join('') + '</div>' +
      '</div>';
    }).join('');

    var profile = currentQuizProfile();
    result.innerHTML = '<div class="quiz-result-label">맞춤형 강의 제안</div>' +
      '<div class="quiz-result-title">' + profile.title + '</div>' +
      '<div class="quiz-result-text">' + profile.text + '</div>';
    recs.innerHTML = profile.ids.map(function (id, i) {
      var c = getCourse(id);
      return c ? '<div class="reveal d' + (i + 1) + '">' + courseCardHTML(c) + '</div>' : '';
    }).join('');
    revealScan();
  }

  function counts() {
    var m = { all: COURSES.length };
    CATS.forEach(function (c) { if (c.id !== 'all') m[c.id] = COURSES.filter(function (x) { return x.cat === c.id; }).length; });
    return m;
  }

  function renderTabs() {
    var cnt = counts();
    var html = CATS.map(function (c) {
      var cc = CAT_COLOR[c.id], active = state.tab === c.id;
      var style = active ? 'background:' + cc.strong + ';border-color:' + cc.strong + ';color:#fff'
                         : 'color:' + cc.solid + ';border-color:' + cc.tint + ';background:' + cc.tint;
      return '<button class="tab' + (active ? ' active' : '') + '" data-tab="' + c.id + '" style="' + style + '">' + c.name + ' <span class="cnt">' + cnt[c.id] + '</span></button>';
    }).join('');
    document.getElementById('tabs').innerHTML = html;
  }

  function renderGrid() {
    var list = state.tab === 'all' ? COURSES.slice() : COURSES.filter(function (c) { return c.cat === state.tab; });
    if (state.sort === 'low') list.sort(function (a, b) { return a.price - b.price; });
    else if (state.sort === 'new') list.sort(function (a, b) { return (b.badges.indexOf('UPDATE') >= 0 ? 1 : 0) - (a.badges.indexOf('UPDATE') >= 0 ? 1 : 0); });
    else list.sort(function (a, b) { return b.hearts - a.hearts; });
    var totalPages = COURSE_PAGE_COUNT;
    if (state.page > totalPages) state.page = totalPages;
    var pageList = [];
    if (list.length) {
      var start = (state.page - 1) * PAGE_SIZE;
      for (var pi = 0; pi < PAGE_SIZE; pi++) pageList.push(list[(start + pi) % list.length]);
    }
    document.getElementById('course-grid').innerHTML = pageList.map(function (c, i) {
      return '<div class="reveal d' + ((i % 4) + 1) + '">' + courseCardHTML(c) + '</div>';
    }).join('');
    renderPagination(totalPages);
    revealScan();
  }

  function renderPagination(totalPages) {
    var html = '<button class="page-btn page-arrow" data-page-prev aria-label="이전 페이지"' + (state.page === 1 ? ' disabled' : '') + '>' + icon('chevron-left', 22) + '</button>';
    for (var i = 1; i <= totalPages; i++) {
      html += '<button class="page-btn' + (state.page === i ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }
    html += '<button class="page-btn page-arrow" data-page-next aria-label="다음 페이지"' + (state.page === totalPages ? ' disabled' : '') + '>' + icon('chevron-right', 22) + '</button>';
    document.getElementById('course-pagination').innerHTML = html;
  }

  function renderSortMenu() {
    document.getElementById('sortMenu').innerHTML = SORTS.map(function (s) {
      var on = state.sort === s.id;
      return '<button data-sort="' + s.id + '" style="display:block;width:100%;text-align:left;background:' + (on ? 'var(--color-emerald-5)' : 'transparent') + ';color:' + (on ? 'var(--color-primary-heavy)' : 'var(--color-label-normal)') + ';border:0;border-radius:7px;padding:9px 11px;font:500 13px/1 var(--font-sans);cursor:pointer">' + s.name + '</button>';
    }).join('');
  }

  /* ---------- reveal ---------- */
  var io = null;
  function revealScan() {
    var els = document.querySelectorAll('.reveal:not(.in)');
    if (!('IntersectionObserver' in window)) { els.forEach(function (e) { e.classList.add('in'); }); return; }
    if (!io) {
      io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    }
    els.forEach(function (e) { io.observe(e); });
  }

  function smoothTo(id) {
    var elx = document.getElementById(id);
    if (elx) window.scrollTo({ top: elx.getBoundingClientRect().top + window.scrollY - 60, behavior: 'smooth' });
  }

  /* ---------- mount + events ---------- */
  function mount() {
    document.getElementById('app').innerHTML = pageHTML();
    renderTabs();
    renderSortMenu();
    renderQuiz();
    renderGrid();
    revealScan();

    document.addEventListener('click', function (e) {
      var go = e.target.closest('[data-go]');
      if (go) { e.preventDefault(); smoothTo(go.getAttribute('data-go')); return; }

      var tab = e.target.closest('[data-tab]');
      if (tab) { state.tab = tab.getAttribute('data-tab'); state.page = 1; renderTabs(); renderGrid(); return; }

      var page = e.target.closest('[data-page]');
      if (page) { state.page = Number(page.getAttribute('data-page')); renderGrid(); return; }

      if (e.target.closest('[data-page-prev]') && state.page > 1) { state.page -= 1; renderGrid(); return; }
      if (e.target.closest('[data-page-next]')) { state.page += 1; renderGrid(); return; }

      var quiz = e.target.closest('[data-quiz]');
      if (quiz) { quizState[quiz.getAttribute('data-quiz')] = quiz.getAttribute('data-quiz-value'); renderQuiz(); return; }

      var sortBtn = e.target.closest('#sortBtn');
      var menu = document.getElementById('sortMenu');
      if (sortBtn) { menu.hidden = !menu.hidden; return; }

      var so = e.target.closest('[data-sort]');
      if (so) { state.sort = so.getAttribute('data-sort'); state.page = 1; document.getElementById('sortName').textContent = SORTS.filter(function (s) { return s.id === state.sort; })[0].name; renderSortMenu(); renderGrid(); menu.hidden = true; return; }
      if (menu && !menu.hidden) menu.hidden = true;

      var q = e.target.closest('.faq-q');
      if (q) {
        var item = q.parentElement, list = document.getElementById('faq-list');
        var wasOpen = item.classList.contains('open');
        list.querySelectorAll('.faq-item.open').forEach(function (x) { x.classList.remove('open'); x.querySelector('.faq-q').setAttribute('aria-expanded', 'false'); });
        if (!wasOpen) { item.classList.add('open'); q.setAttribute('aria-expanded', 'true'); }
        return;
      }
    });

    /* anchor links smooth scroll */
    document.querySelectorAll('a[href^="#"]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        var id = a.getAttribute('href').slice(1);
        if (id && document.getElementById(id)) { e.preventDefault(); smoothTo(id); }
      });
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount);
  else mount();
})();
</script>
</body>
</html>
